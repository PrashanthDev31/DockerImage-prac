name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: dockerimage-prac
      REGISTRY: ghcr.io
      OWNER: prashanthdev31

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$OWNER/$IMAGE_NAME:latest .
          docker build -t $REGISTRY/$OWNER/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$OWNER/$IMAGE_NAME:latest
          docker push $REGISTRY/$OWNER/$IMAGE_NAME:${{ github.sha }}
